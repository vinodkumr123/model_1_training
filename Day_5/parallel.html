<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .main-container{
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            height: 250px;
            width: 500px;
        }

        .container{
            border-radius: 50%;
            height: 250px;
            width: 250px;
            object-fit: cover;
            overflow: hidden;
        }

        .container img{
            width: 100%;
            height: 100%;
            object-fit:fill;
            transition: 0.5s;
        }

        .main-container:hover .container img{
            transform: scale(1.1);  
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="container">
            <img src="https://img.magnific.com/free-photo/closeup-shot-beautiful-butterfly-with-interesting-textures-orange-petaled-flower_181624-7640.jpg?semt=ais_hybrid&w=740&q=80" alt="nature">
        </div>
        <div class="container">
            <img src="https://img.magnific.com/free-photo/closeup-shot-beautiful-butterfly-with-interesting-textures-orange-petaled-flower_181624-7640.jpg?semt=ais_hybrid&w=740&q=80" alt="nature">
        </div>
    </div>
</body>
</html>
