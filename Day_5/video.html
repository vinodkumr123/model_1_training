<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Position</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background-color: black;
        }

        .video-container{
            width:640px;
            height:360px;
            border-radius:10px;
            overflow:hidden;
        }

        .video-container video{
            width:100%;
            height:100%;
            object-fit:cover;
            transition: 0.2s;
        }

         video:hover{
            transform: scale(1.1);   
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video controls>
            <source src="../Day_2/WhatsApp Video .mp4" type="video/mp4">
        </video>
    </div>
</body>
</html>
