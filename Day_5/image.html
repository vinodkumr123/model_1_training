<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        div{
            margin: auto;
            height: 500px;
            width: 500px;
            background-color: blueviolet;
            object-fit: cover;
            overflow: hidden;
            border-radius: 50%;
        }

        div img{
            width: 100%;
            height: 100%;
            object-fit:fill;
            transition: 0.5s;
        }

        img:hover{
            transform: scale(1.1);
           
        }
    </style>
</head>
<body>
    <div><img src="https://img.magnific.com/free-photo/closeup-shot-beautiful-butterfly-with-interesting-textures-orange-petaled-flower_181624-7640.jpg?semt=ais_hybrid&w=740&q=80" alt="nature"></div>
</body>
</html>
