<!doctype html>
<html>
  <head>
    <title>Invitation Card</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial;
      }

      body {
        background: #f5d9ff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        width: 900px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 0 20px gray;
        overflow: hidden;
      }

      .header {
        background: #8e44ad;
        color: white;
        text-align: center;
        padding: 25px;
      }

      .header h1 {
        font-size: 40px;
      }

      .content {
        padding: 30px;
        text-align: center;
      }

      .content h2 {
        color: #8e44ad;
        margin-bottom: 15px;
        font-size: 32px;
      }

      .content p {
        font-size: 20px;
        margin: 10px 0;
      }

      .section {
        margin-top: 30px;
      }

      audio,
      video {
        width: 100%;
        margin-top: 15px;
        border-radius: 10px;
      }

      iframe {
        width: 100%;
        height: 300px;
        border: none;
        border-radius: 10px;
        margin-top: 15px;
      }

      .footer {
        background: #8e44ad;
        color: white;
        text-align: center;
        padding: 15px;
        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>Wedding Invitation</h1>
      </div>

      <div class="content">
        <h2>You Are Invited</h2>

        <p><b>Rahul ❤️ Priya</b></p>
        <p>Date: 25 December 2026</p>
        <p>Time: 7:00 PM</p>
        <p>Venue: Silver Oak Garden, Ahmedabad</p>

        <!-- Audio Section -->
        <div class="section">
          <h2>Invitation Music</h2>

          <audio controls autoplay loop>
            <source
              src="WhatsApp Audio .mpeg"
              type="audio/mpeg"
            />
          </audio>
        </div>

        <!-- Video Section -->
        <div class="section">
          <h2>Invitation Video</h2>

          <video width="400" controls autoplay muted loop>
            <source
              src="WhatsApp Video .mp4"
              type="video/mp4"
            />
            Your browser does not support the video tag.
          </video>
        </div>

        <!-- Map Section -->
        <div class="section">
          <h2>Location</h2>

          <iframe
            src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d29383.13765156538!2d72.6344929!3d22.990991!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1778578119200!5m2!1sen!2sin"
            width="600"
            height="450"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>
      </div>

      <div class="footer">We are waiting for your presence ❤️</div>
    </div>
  </body>
</html>
