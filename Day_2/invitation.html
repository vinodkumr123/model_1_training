<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invitation</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: #fff5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card{
      width: 800px;
      background: white;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border: 5px solid #ffb6c1;
    }

    h1{
      color: #d63384;
      font-size: 50px;
      margin-bottom: 10px;
    }

    h2{
      color: #444;
      margin-bottom: 20px;
    }

    p{
      font-size: 18px;
      color: #555;
      margin: 10px 0;
      line-height: 1.6;
    }

    .names{
      font-size: 40px;
      color: #c2185b;
      margin: 20px 0;
      font-weight: bold;
    }

    .details{
      background: #ffe4ec;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
    }

    audio, video{
      margin-top: 20px;
      width: 100%;
      border-radius: 10px;
    }

    iframe{
      width: 100%;
      height: 300px;
      border: 0;
      margin-top: 20px;
      border-radius: 10px;
    }

    .footer{
      margin-top: 20px;
      color: #777;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>Wedding Invitation</h1>

    <p>Together with their families</p>

    <div class="names">
      Rahul ❤️ Priya
    </div>

    <p>
      Request the honor of your presence<br>
      at their wedding celebration
    </p>

    <div class="details">
      <p><strong>Date:</strong> 25 December 2026</p>
      <p><strong>Time:</strong> 7:00 PM</p>
      <p><strong>Venue:</strong> Royal Palace, Ahmedabad</p>
    </div>

    <!-- Audio -->
    <h2>Wedding Music</h2>

    <audio controls autoplay loop>
      <source src="wedding-song.mp3" type="audio/mp3">
      Your browser does not support audio.
    </audio>

    <!-- Video -->
    <h2>Wedding Video</h2>

    <video controls>
      <source src="wedding-video.mp4" type="video/mp4">
      Your browser does not support video.
    </video>

    <!-- Google Map -->
    <h2>Location Map</h2>

    <iframe 
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3672.002!2d72.5714!3d23.0225!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e84f9b8f1f9f1%3A0x2c1b0f9b8f1f9f1!2sAhmedabad!5e0!3m2!1sen!2sin!4v1710000000000">
    </iframe>

    <div class="footer">
      We are waiting for your lovely presence ❤️
    </div>

  </div>

</body>
</html>
