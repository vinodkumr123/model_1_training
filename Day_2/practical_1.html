<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="practical_1.css">
    <title>Document</title>
</head>
<body>
    <header>
        <div>
            <img src="https://silveroakuni.ac.in/_next/image?url=%2Fassets%2Fimages%2Flogo.webp&w=640&q=75" alt="logo">
            <h2>Silver Oak University</h2>
            <!-- navigation link -->
            <nav>
                <li><a href="#">Home</a></li>
                <li><a href="#">Sign up</a></li>
                <li><a href="#">Sign in</a></li>
                <li><a href="#">about us</a></li>
                <li><a href="#">Contact us</a></li>
            </nav>
        </div>
    </header>

    <main>
        <article>
            <!-- student registration form -->
                <h2>Student Registration Form</h2>
                <form action="">

                    <label for="user">Name:</label>
                    <input id="user" type="text" placeholder="Full Name" name="username"><br><br>
                    <label for="enroll">Enrollment</label>
                    <input id="enroll" type="text" name="" id="" maxlength="12" name="enrollment"><br><br>

                    <label for="branch">Branch</label>
                    <select name="branch" id="branch">
                        <option value="CSE">CSE</option>
                        <option value="CE">CE</option>
                    </select><br><br>
                    
                    <label for="div">Division</label>
                    <input id="div" type="text" name="division"><br><br>
                    <label for="gender">Gender</label>
                    <input id="gender" type="radio" name="gender" value="male">male
                    <input id="gender" type="radio" name="gender" value="female">female <br><br>
                    <label for="mobile">Mobile No.</label>
                    <input type="tel" name="mobile"><br><br>
                    <label for="email">Email</label>
                    <input type="email" name="email"><br><br>
                    <label for="pass">Password</label>
                    <input id="pass" type="password"><br><br>
                    <label for="photo">Photo</label>
                    <input type="file" name="photo" accept="image/*"><br><br>
                    <label for="remember">Remember Me</label>
                    <input id="remember" type="checkbox" name="remember" value="yes"><br><br>
                    <button id="btn1" type="submit" value="Submit">Submit</button>
                    <button id="btn2" type="reset" value="Reset">Reset</button>

                </form>
        </article>
    </main>

    <footer>
        <!-- social media link -->
        <div>
            <nav>
                <li><a href="">Instagram</a></li>
                <li><a href="">facebook</a></li>
                <li><a href="">Linkedin</a></li>
                <li><a href="">whatsapp</a></li>
                <li><a href="">Github</a></li>
            </nav>
        </div>
    </footer>
  </body>
</html>
