<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Moving Rotating Box</title>

    <style>

        *{
            
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
            overflow: hidden;
        }

        .container{
            width: 300px;
            height: 300px;
            position: relative;
            animation: orbit 4s linear infinite;
        }

        .box{
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, #ff4d4d, #4da6ff);
            position: absolute;
            top: 0;
            left: 100px;
            border-radius: 12px;
            animation: scaleBox 2s ease-in-out infinite;
        }

        @keyframes orbit{
            from{
                transform: rotate(0deg);
            }

            to{
                transform: rotate(360deg);
            }
        }

        
        @keyframes scaleBox{

            0%{
                transform: scale(1);
            }

            50%{
                transform: scale(1.5);
            }

            100%{
                transform: scale(1);
            }
        }

    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
    </div>
  </body>
</html>
