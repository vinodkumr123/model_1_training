<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">
                        <h2 class="text-center text-primary fw-bold mb-4">Student Registration Form</h2>
                        <form action="">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Full Name</label>
                                    <input type="text" class="form-control" placeholder="Enter Full Name">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Enrollment No.</label>
                                    <input type="text" class="form-control" maxlength="12" placeholder="Enter Enrollment">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Branch</label>
                                    <select class="form-select">
                                        <option>CSE</option>
                                        <option>CE</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Division</label>
                                    <input type="text" class="form-control" placeholder="Enter Division">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold d-block">Gender</label>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="gender">
                                        <label class="form-check-label">Male</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="gender">
                                        <label class="form-check-label">Female</label>
                                    </div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Mobile No.</label>
                                    <input type="tel" class="form-control" placeholder="Enter Mobile Number">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Email</label>
                                    <input type="email" class="form-control" placeholder="Enter Email">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Password</label>
                                    <input type="password" class="form-control" placeholder="Enter Password">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Upload Photo</label>
                                    <input type="file" class="form-control">
                                </div>
                                <div class="col-md-6 d-flex align-items-center">
                                    <div class="form-check mt-3">
                                        <input class="form-check-input" type="checkbox">
                                        <label class="form-check-label">Remember Me</label>
                                    </div>
                                </div>
                            </div>

                            <div class="text-center mt-4">
                                <input type="submit" value="Submit" class="btn btn-primary px-4 me-2">
                                <input type="reset" value="Reset" class="btn btn-danger px-4">
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        document.querySelector("form").addEventListener("submit", function(event){
            // Prevent Form Submit
            event.preventDefault();
            // Inputs
            let fullName = document.querySelector('input[type="text"]').value.trim();
            let enrollment = document.querySelectorAll('input[type="text"]')[1].value.trim();
            let division = document.querySelectorAll('input[type="text"]')[2].value.trim();
            let mobile = document.querySelector('input[type="tel"]').value.trim();
            let email = document.querySelector('input[type="email"]').value.trim();
            let password = document.querySelector('input[type="password"]').value.trim();
            let gender = document.querySelector('input[name="gender"]:checked');
            let checkbox = document.querySelector('input[type="checkbox"]');
            // Validation
            if(fullName === ""){
                alert("Please Enter Full Name");
                return;
            }
            if(enrollment.length !== 12){
                alert("Enrollment Number must be 12 digits");
                return;
            }
            if(division === ""){
                alert("Please Enter Division");
                return;
            }
            if(gender == null){
                alert("Please Select Gender");
                return;
            }
            if(mobile.length !== 10 || isNaN(mobile)){
                alert("Please Enter Valid Mobile Number");
                return;
            }
            if(email === ""){
                alert("Please Enter Email");
                return;
            }
            if(password.length < 6){
                alert("Password must be at least 6 characters");
                return;
            }
            if(!checkbox.checked){
                alert("Please Check Remember Me");
                return;
            }
            // Success
            alert("Form Submitted Successfully");
            // Submit Form
            this.submit();
        });
    </script>
  </body>
</html>
