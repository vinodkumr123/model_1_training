<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Auto Slider</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="m-0 p-0">
  <div id="slider" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#slider" data-bs-slide-to="0" class="active"></button>
      <button type="button" data-bs-target="#slider" data-bs-slide-to="1"></button>
      <button type="button" data-bs-target="#slider" data-bs-slide-to="2"></button>
      <button type="button" data-bs-target="#slider" data-bs-slide-to="3"></button>
      <button type="button" data-bs-target="#slider" data-bs-slide-to="4"></button>
      <button type="button" data-bs-target="#slider" data-bs-slide-to="5"></button>
    </div>

    <div class="carousel-inner">
      <div class="carousel-item active" data-bs-interval="2000">
        <img src="https://picsum.photos/id/1015/1600/900" class="d-block w-100 vh-100" alt="">
      </div>
      <div class="carousel-item" data-bs-interval="2000">
        <img src="https://picsum.photos/id/1016/1600/900" class="d-block w-100 vh-100" alt="">
      </div>
      <div class="carousel-item" data-bs-interval="2000">
        <img src="https://picsum.photos/id/1018/1600/900" class="d-block w-100 vh-100" alt="">
      </div>
      <div class="carousel-item" data-bs-interval="2000">
        <img src="https://picsum.photos/id/1020/1600/900" class="d-block w-100 vh-100" alt="">
      </div>
      <div class="carousel-item" data-bs-interval="2000">
        <img src="https://picsum.photos/id/1024/1600/900" class="d-block w-100 vh-100" alt="">
      </div>
      <div class="carousel-item" data-bs-interval="2000">
        <img src="https://picsum.photos/id/1035/1600/900" class="d-block w-100 vh-100" alt="">
      </div>
    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#slider" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#slider" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
