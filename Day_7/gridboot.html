<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center text-center mb-5">
            <div class="col-lg-8">
                <div class="card border-0 shadow-lg rounded-4 p-5 bg-light">
                    <h2 class="display-5 fw-bold text-primary">🎉You Are Invited 🎉</h2>
                    <p class="lead mt-3 text-muted">Join us for a wonderful birthday celebration with family and friends.</p>
                        <div class="row mt-4 g-3">
                            <div class="col-md-4">
                                <div class="bg-primary text-white p-3 rounded-4 shadow">
                                    <h5>Date</h5>
                                    <p class="mb-0">12 May 2026</p>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="bg-success text-white p-3 rounded-4 shadow">
                                    <h5>Time</h5>
                                    <p class="mb-0">7:00 PM</p>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="bg-danger text-white p-3 rounded-4 shadow">
                                    <h5>Venue</h5>
                                    <p class="mb-0">Banquet Nikol</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-5 justify-content-center text-center">
                <div class="col-8">
                <div class="card border-0 shadow-lg rounded-4 p-4">
                    <h2 class="text-center fw-bold text-success mb-4">📍 Party Location</h2>
                    <iframe class="w-100 rounded-4" height="350" src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d29383.13765156538!2d72.6344929!3d22.990991!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1778578119200!5m2!1sen!2sin" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
