<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Student Registration Form</h2>
    <form action="">

        <label for="user">Name:</label>
        <input id="user" type="text" placeholder="Full Name" name="username"><br><br>
        <label for="enroll">Enrollment</label>
        <input id="enroll" type="text" name="" id="" maxlength="12" name="enrollment"><br><br>

        <label for="branch">Branch</label>
        <select name="branch" id="branch">
            <option value="CSE">CSE</option>
            <option value="CE">CE</option>
        </select><br><br>
        
        <label for="div">Division</label>
        <input id="div" type="text" name="division"><br><br>
        <label for="gender">Gender</label>
        <input id="gender" type="radio" name="gender" value="male">male
        <input id="gender" type="radio" name="gender" value="female">female <br><br>
        <label for="mobile">Mobile No.</label>
        <input type="tel" name="mobile"><br><br>
        <label for="email">Email</label>
        <input type="email" name="email"><br><br>
        <label for="pass">Password</label>
        <input id="pass" type="password"><br><br>
        <label for="photo">Photo</label>
        <input type="file" name="photo" accept="image/*"><br><br>
        <label for="remember">Remember Me</label>
        <input id="remember" type="checkbox" name="remember" value="yes"><br><br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>
</body>
</html>
