<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z-Index</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      position:relative;
      width:400px;
      height:300px;
    }

    .box{
      width:200px;
      height:200px;
      position:absolute;
      color:white;
      font-size:24px;
      display:flex;
      justify-content:center;
      align-items:center;
      border-radius:15px;
    }

    .red{
      background:red;
      top:20px;
      left:20px;
      z-index:1;
    }

    .blue{
      background:blue;
      top:70px;
      left:70px;
      z-index:2;
    }

    .green{
      background:green;
      top:120px;
      left:120px;
      z-index:3;
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="box red">z-index 1</div>
    <div class="box blue">z-index 2</div>
    <div class="box green">z-index 3</div>
  </div>
 </body>
</html>
