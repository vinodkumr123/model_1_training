    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    </head>
    <body>
        
        <h1>Delete row using Jquery</h1>
        
        <table border = "2" id="myTable" cellpadding="8" cellspacing="0" style="margin-top:10px; width: 50%;">
            <tr>
                <th>id</th>
                <th>name</th>
                <th>profession</th>
                <th>Action</th>
            </tr>
            <tr>
                <td>1</td>
                <td>John</td>
                <td>Developer</td>
                <td><button class="deleteBtn">Delete</button></td>
            </tr>
            <tr>
                <td>2</td>
                <td>Jane</td>
                <td>Designer</td>
                <td><button class="deleteBtn">Delete</button></td>
            </tr>
            <tr>
                <td>3</td>
                <td>Doe</td>
                <td>Manager</td>
                <td><button class="deleteBtn">Delete</button></td>
            </tr>
            <tr>
                <td>4</td>
                <td>Smith</td>
                <td>Analyst</td>
                <td><button class="deleteBtn">Delete</button></td>
            </tr>
        </table>

        <script>
            $(document).ready(function(){
                $(".deleteBtn").click(function(){
                    $(this).closest("tr").remove();
                });
            });
        </script>

    </body>
    </html>
